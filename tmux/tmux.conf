# ~/.tmux.conf
# Focused on native keybinds and has a good status config

# 256 color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Split panes/windows in current working directory
unbind %
bind % split-window -h -c "#{pane_current_path}"

unbind '"'
bind '"' split-window -v -c "#{pane_current_path}"

set -g detach-on-destroy off
set -g renumber-windows on
set -g set-clipboard on
set -g focus-events on
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xsel --clipboard --input"

# Tokyo Night Moon theme colors
thm_bg="#222436"
thm_fg="#c8d3f5"
thm_cyan="#86e1fc"
thm_black="#1b1d2b"
thm_gray="#3a3f5a"
thm_magenta="#c099ff"
thm_pink="#ff757f"
thm_red="#ff757f"
thm_green="#c3e88d"
thm_yellow="#ffc777"
thm_blue="#82aaff"
thm_orange="#ff9e64"
thm_black4="#444a73"

# Apply theme to panes and windows
set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"
set -g window-status-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-current-format "#[fg=${thm_blue},bg=${thm_bg}] #I #[fg=${thm_fg},bg=${thm_bg}]#W"

## Status Bar
set -g status on
set -g status-bg "${thm_bg}"
set -g status-position top
set -g status-justify left
set -g status-left ""
set -g status-right-length 100
set -g status-left-length 100

set -g status-right "#[fg=${thm_cyan},bg=${thm_bg}]#( \
  OUTPUT=\"\"; \
  \
  # Network: WiFi first, else Ethernet, else Disconnected
  NET_OUTPUT=\"\"; \
  for iface in \$(ip -br a 2>/dev/null | awk '\$2 == \"UP\" {print \$1}'); do \
    if iw dev \"\$iface\" info >/dev/null 2>&1; then \
      SSID=\$(iw dev \"\$iface\" link 2>/dev/null | grep SSID | cut -d ' ' -f2-); \
      NET_OUTPUT=\"Net: \${SSID:-unknown}\"; \
      break; \
    fi; \
  done; \
  [ -z \"\$NET_OUTPUT\" ] && NET_OUTPUT=\$(if ip route 2>/dev/null | grep -q '^default'; then echo \"Net: Connected\"; else echo \"Net: Disconnected\"; fi); \
  [ -n \"\$NET_OUTPUT\" ] && OUTPUT+=\"\$NET_OUTPUT | \"; \
  \
  # Battery
  if [ -f \"/sys/class/power_supply/BAT0/uevent\" ]; then \
    CAPACITY=\$(awk -F= '/^POWER_SUPPLY_CAPACITY=/ {print \$2}' /sys/class/power_supply/BAT0/uevent 2>/dev/null); \
    [ -n \"\$CAPACITY\" ] && OUTPUT+=\"B:\${CAPACITY}% | \"; \
  fi; \
  \
  # VPN
  if ip a 2>/dev/null | grep -qE \"tun0|wg0\"; then \
    OUTPUT+=\"VPN:ON | \"; \
  fi; \
  \
  # Volume
  if command -v amixer >/dev/null 2>&1; then \
    VOLUME=\$(amixer sget Master 2>/dev/null | grep -oE '[0-9]+%' | head -1 | tr -d '%'); \
    [ -n \"\$VOLUME\" ] && OUTPUT+=\"Vol:\${VOLUME}% | \"; \
  fi; \
  \
  # Brightness
  BACKLIGHT_DIR=\"/sys/class/backlight/\$(ls /sys/class/backlight/ 2>/dev/null | head -1)\"; \
  if [ -d \"\$BACKLIGHT_DIR\" ]; then \
    MAX_BRIGHTNESS=\$(cat \"\$BACKLIGHT_DIR/max_brightness\" 2>/dev/null); \
    CUR_BRIGHTNESS=\$(cat \"\$BACKLIGHT_DIR/brightness\" 2>/dev/null); \
    if [ -n \"\$MAX_BRIGHTNESS\" ] && [ \"\$MAX_BRIGHTNESS\" -gt 0 ] && [ -n \"\$CUR_BRIGHTNESS\" ]; then \
      PERCENT=\$((CUR_BRIGHTNESS * 100 / MAX_BRIGHTNESS)); \
      OUTPUT+=\"Bright:\$PERCENT% | \"; \
    fi; \
  fi; \
  \
  # Datetime
  OUTPUT+=\"\$(date '+%A, %d %B %Y %H:%M')\"; \
  \
  # Remove trailing separator if present
  echo \"\${OUTPUT% | }\" \
)"

set -g window-status-activity-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-separator ""
set -g window-status-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-current-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_cyan},bg=${thm_bg}]#(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev) #[fg=${thm_magenta},bg=${thm_bg}]"
set -g window-status-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_fg},bg=${thm_bg}]#W"

# Messages
set -g message-style "fg=${thm_cyan},bg=${thm_gray},align=centre"
set -g message-command-style "fg=${thm_cyan},bg=${thm_gray},align=centre"

# Modes
set -g clock-mode-colour "${thm_blue}"
set -g mode-style "fg=${thm_blue} bg=${thm_black4} bold"
